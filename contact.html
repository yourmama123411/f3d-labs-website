<!DOCTYPE html>
<html>
<head>
  <title>Contact - F3D</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
  <a href="/">Home</a>
  <a href="/contact.html">Contact</a>
</nav>

<h1>📩 F3D AI Order System</h1>

<div class="chat-box" id="chat"></div>

<div class="input-area">
  <input id="userInput" placeholder="Type your message...">
  <button onclick="send()">Send</button>
</div>

<script>
async function send() {
    let input = document.getElementById("userInput").value;
    let chat = document.getElementById("chat");

    if(input.trim() === "") return;

    chat.innerHTML += `<div class="user-msg">${input}</div>`;
    document.getElementById("userInput").value = "";

    chat.innerHTML += `<div class="ai-msg">🤖 Thinking...</div>`;

    let response = await fetch("https://f3d-ai.onrender.com/ai", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: input })
    });

    let data = await response.json();

    chat.innerHTML += `<div class="ai-msg">${data.reply}</div>`;
}
</script>
document.getElementById("userInput").addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
        send();
    }
});
</body>
</html>
